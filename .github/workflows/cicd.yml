name: CI Pipeline

on:
  push:
    branches: [main] #Run on pushes to main
  pull_request:
    branches: [main] #Run on pull requests to main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code #把程式碼從 repository 下載到虛擬機裡
        uses: actions/checkout@v4

      - name: Set up Node.js #設定 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies #安裝專案依賴套件
        run: yarn install

      # - name: Run tests #執行測試
      #   run: yarn test

      - name: Build Project
        run: yarn build

      - name: Deploy to GitHub Pages (CD)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 打包後的資料夾名稱 (通常是 dist)
          branch: gh-pages # 部署到的目標分支 (GitHub Pages 通常用這個分支跑網頁)